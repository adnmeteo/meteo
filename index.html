<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Station météo Bresser 5-en-1</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🌦️ Station météo Bresser 5-en-1</h1>

</header>

<main>

<section>

<h2>📡 Dernières observations</h2>

<div class="cartes">

<div class="carte">
<h3>🌡️ Température</h3>
<p id="temp">-- °C</p>
</div>

<div class="carte">
<h3>💧 Humidité</h3>
<p id="hum">-- %</p>
</div>

<div class="carte">
<h3>📈 Pression</h3>
<p id="pres">-- hPa</p>
</div>

<div class="carte">
<h3>🌬️ Vent moyen</h3>
<p id="vent">-- km/h</p>
</div>

<div class="carte">
<h3>💨 Rafale</h3>
<p id="rafale">-- km/h</p>
</div>

</div>

</section>

<section>

<h2>📊 Données météo</h2>

<div id="tableau"></div>

</section>

</main>

<script src="script.js"></script>

</html>
